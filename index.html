<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gb1WebMap2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <div id="main-layout" style="height: 100vh; display: flex; flex-direction: column; overflow: hidden;">
        
        <!-- Oberer Teil: Die Karte -->
        <div id="map" class="split" style="width: 100%; position: relative;"></div>

        <!-- Unterer Teil: Der Tabellen-Bereich -->
        <div id="wms-table-container" class="split" style="display: none; flex-direction: column; height: 200px; background: white; border-top: 1px solid #ccc;">
            
            <!-- Fixierter Header mit Schließen-Button -->
            <div id="table-header" style="...">
              <div style="display: flex; align-items: center; gap: 10px;">
              <strong style="...">Ebene:</strong>
              <select id="layer-selector" onchange="switchLayerData()" style="padding: 2px 5px; border-radius: 4px; border: 1px solid #ccc;">
              <!-- Optionen werden dynamisch per JavaScript gefüllt -->
              </select>
            </div>
            <!--<button onclick="closeTable()" style="...">✕ Schließen</button>-->
            <button id="closeTableBtn">✕ Schließen</button>
          </div>
            <!-- Die eigentliche Tabelle (füllt den Rest aus) -->
            <div id="wms_data_table" style="flex: 1; width: 100%; overflow: hidden;"></div>
            
        </div>
    </div>


  <script type="module" src="/main.js"></script>
</body>

</html>
