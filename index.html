<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gb1WebMap2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="./style.css">
   
  <style>
      body {
        
        margin: 0;
      }
      
      .ol-legend > canvas {
        float: left;
      }
      .ol-legend > div.ol-legend {
        position: relative;
      }
    </style>
</head>
<body>
  <div id="main-layout" style="height: 100vh; display: flex; flex-direction: column; overflow: hidden;">
    <div id="map" class="split" style="width: 100%; position: relative;"></div>
    <div id="coordinate_selection" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: white; padding: 10px; border-radius: 8px; border: 1px solid #ccc; z-index: 1100; display: none;">
    <select name="coord_choice" id="coord_select">
      <option value="EPSG:32632" selected>EPSG:32632 (UTM, WGS84)</option>
      <option value="EPSG:25832">EPSG:25832 (UTM, ETRS89)</option>
      <option value="EPSG:3857">EPSG:3857 (Web Mercator)</option>
      <option value="EPSG:4326 (Breite,Länge!)">EPSG:4326 (Länge-/Breite)</option>
      <option value="EPSG:31467">EPSG:31467 (GK, 3M)</option>
      <option value="EPSG:31466">EPSG:31466 (GK, 2M)</option>
    </select>
     <button id="start-coord-input" style="margin-left: 5px;">📍 Koordinate eingeben</button>
    </div> 
    <div id="wms-table-container" class="split">
      <div id="table-header">
        <div class="header-controls-left">
          <strong>Ebene:</strong>
          <select id="layer-selector"></select>
        </div>
        <button id="close-table-btn">✕ Schließen</button>
      </div>
      <div id="wms_data_table"></div>
    </div>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
